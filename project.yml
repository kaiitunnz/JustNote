name: JustNote
options:
  bundleIdPrefix: com.justnote
  deploymentTarget:
    macOS: "27.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
  configs:
    Debug:
      CODE_SIGN_IDENTITY: "-"
      CODE_SIGN_STYLE: Manual
      CODE_SIGNING_REQUIRED: "NO"
      CODE_SIGNING_ALLOWED: "NO"
    Release:
      CODE_SIGN_STYLE: Automatic
      CODE_SIGN_IDENTITY: "Apple Development"
      CODE_SIGNING_REQUIRED: "YES"
      CODE_SIGNING_ALLOWED: "YES"
      DEVELOPMENT_TEAM: "C62G6XUR78"

packages:
  MarkdownView:
    url: https://github.com/LiYanan2004/MarkdownView.git
    # Pinned to a main commit: the 2.7.0 release fails to compile against the macOS 27 SDK
    # ('Document' ambiguity), fixed on main.
    revision: 7f55e9dc4cee6b788ac94b6187b2e0ce663c00df
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts.git
    # Exact-version pin (the .xcodeproj — and its Package.resolved — is git-ignored, so a
    # range would let checkouts drift). Verified to compile against the macOS 27 SDK.
    exactVersion: 1.9.4

schemes:
  JustNote:
    build:
      targets:
        JustNote: all
        JustNoteTests: [test]
    test:
      targets:
        - JustNoteTests

targets:
  JustNote:
    type: application
    platform: macOS
    sources:
      - Sources/JustNote
      - path: Resources/JustNote.icon
        type: file
    dependencies:
      - package: MarkdownView
      - package: KeyboardShortcuts
    settings:
      base:
        PRODUCT_NAME: JustNote
        PRODUCT_BUNDLE_IDENTIFIER: com.justnote.app
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_LSUIElement: "YES"
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        ASSETCATALOG_COMPILER_APPICON_NAME: JustNote
        MACOSX_DEPLOYMENT_TARGET: "27.0"

  JustNoteTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests/JustNoteTests
    dependencies:
      - target: JustNote
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.justnote.app.tests
        GENERATE_INFOPLIST_FILE: "YES"
        MACOSX_DEPLOYMENT_TARGET: "27.0"
